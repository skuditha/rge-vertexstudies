empty_wire_local_fit:
  run: "020507"

  histogram:
    bins: 240
    vz_min_cm: -12.0
    vz_max_cm: 4.0

  categories:
    # particle: REC::Particle.vz only
    # ftrack:  REC::FTrack.vz only, losing tracks without FTrack
    # hybrid:  REC::FTrack.vz when available, otherwise REC::Particle.vz
    vertex_sources: ["particle", "ftrack", "hybrid"]

    charges: ["negative", "positive"]
    detector_regions: ["forward", "central"]

    # Forward detector gets all + sector 1-6.
    forward_sectors: ["all", 1, 2, 3, 4, 5, 6]

    # Central detector is sectorless.
    central_sectors: ["all"]

    # FTrack-only is not useful for the central detector in this workflow.
    # Hybrid is still kept for central; if no FTrack exists, it equals Particle.
    skip_central_ftrack: true

  quality:
    chi2pid_abs_max: null
    min_entries_per_category: 1000
    min_entries_per_local_window: 100

  peak_finding:
    enabled: true
    smoothing_bins: 5
    min_peak_counts: 20
    min_relative_prominence: 0.04

  reference_foil:
    component_name: "reference_foil"
    n_sigma_window: 3.0

  local_background:
    enabled: true
    shape: "poly2"

  components:
    ld2_entrance:
      expected_mean_cm: -7.6
      search_window_cm: [-8.6, -6.8]
      fit_window_cm: [-8.8, -6.6]
      initial_sigma_cm: 0.25
      sigma_bounds_cm: [0.03, 1.50]
      required_for_reference: false

    ld2_exit:
      expected_mean_cm: -5.5
      search_window_cm: [-6.4, -4.8]
      fit_window_cm: [-6.6, -4.6]
      initial_sigma_cm: 0.25
      sigma_bounds_cm: [0.03, 1.50]
      required_for_reference: false

    reference_foil:
      expected_mean_cm: -3.5
      search_window_cm: [-4.3, -2.7]
      fit_window_cm: [-4.5, -2.5]
      initial_sigma_cm: 0.20
      sigma_bounds_cm: [0.03, 1.50]
      required_for_reference: true

    wire:
      expected_mean_cm: -1.6
      search_window_cm: [-2.4, -0.8]
      fit_window_cm: [-2.6, -0.6]
      initial_sigma_cm: 0.20
      sigma_bounds_cm: [0.03, 1.50]
      required_for_reference: false